{% set version = "0.3.0" %}

package:
  name: cladebreaker
  version: {{ version }}
source:
  url: https://github.com/andriesfeder/cladebreaker/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('cladebreaker', max_pin="x") }}
requirements:
  host:
    - python >=3.10
  run:
    - python
    - biopython
    - nextflow
    - graphviz
test:
  commands:
    - "cladebreaker --version"

about:
  home: https://github.com/andriesfeder/cladebreaker
  license: MIT
  summary: Nextflow pipeline for phylogenetic analysis.
extra:
  container:
    extended-base: true
  copy_test_source_files: true
  final: true
