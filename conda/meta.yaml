{% set version = "0.3.1" %}

package:
  name: cladebreaker
  version: {{ version }}
source:
  url: https://github.com/andriesfeder/cladebreaker/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e6fcff8554e02529a86f568a0e56f46c7caef3151272528cd74e8a156cb0b274
build:
  noarch: generic
  number: 0
  run_exports:
    - cladebreaker
requirements:
  run:
    - python
    - biopython
    - nextflow
    - graphviz
test:
  commands:
    - "cladebreaker --version"

about:
  home: https://github.com/andriesfeder/cladebreaker
  license: MIT
  summary: Nextflow pipeline for phylogenetic analysis.
extra:
  container:
    extended-base: true
  copy_test_source_files: true
  final: true
