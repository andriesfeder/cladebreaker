{% set version = "0.3.0" %}

package:
  name: cladebreaker
  version: {{ version }}
source:
  url: https://github.com/andriesfeder/cladebreaker/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 8e33633d5fed4b8ca021f5ebf11fcf187a63edf349811e525ba621e741d0c20c
build:
  noarch: generic
  number: 0
  run_exports:
    - cladebreaker
requirements:
  run:
    - python
    - biopython
    - nextflow
    - graphviz
test:
  commands:
    - "cladebreaker --version"

about:
  home: https://github.com/andriesfeder/cladebreaker
  license: MIT
  summary: Nextflow pipeline for phylogenetic analysis.
extra:
  container:
    extended-base: true
  copy_test_source_files: true
  final: true
